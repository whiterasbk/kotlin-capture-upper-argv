name: Create Release & Sync README

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/README.md'
      - '**.md'
      - '.gitignore'
      - '.github/workflows/**'
      - '.devcontainer/devcontainer.json'
  workflow_dispatch:

jobs:
  release:
    if: |
      github.actor == 'whiterasbk' && (
        contains(github.event.head_commit.message, '[release]') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Project Info
        id: info
        run: |
          VERSION=$(grep "^root.version=" gradle.properties | cut -d'=' -f2 | xargs)
          GROUP=$(grep "^root.group.id=" gradle.properties | cut -d'=' -f2 | xargs)
          GRADLE_PLUGIN_ID=$(grep "^gradle.plugin.id=" gradle.properties | cut -d'=' -f2 | xargs)
          GRADLE_PLUGIN_VERSION=$(grep "^gradle.plugin.version=" gradle.properties | cut -d'=' -f2 | xargs)

          C_ARTIFACT=$(grep "^compiler.plugin.artifact.id=" gradle.properties | cut -d'=' -f2 | xargs)
          A_ARTIFACT=$(grep "^compiler.plugin.annotation.artifact.id=" gradle.properties | cut -d'=' -f2 | xargs)
          C_VERSION=$(grep "^compiler.plugin.version=" gradle.properties | cut -d'=' -f2 | xargs)

          COMPILER_COORDINATE_PREFIX="$GROUP:$C_ARTIFACT"
          ANNOTATION_COORDINATE_PREFIX="$GROUP:$A_ARTIFACT"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "gradle_id=$GRADLE_PLUGIN_ID" >> $GITHUB_OUTPUT
          echo "gradle_version=$GRADLE_PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "compiler_version=$C_VERSION" >> $GITHUB_OUTPUT
          echo "compiler_coordinate_prefix=$COMPILER_COORDINATE_PREFIX" >> $GITHUB_OUTPUT
          echo "annotation_coordinate_prefix=$ANNOTATION_COORDINATE_PREFIX" >> $GITHUB_OUTPUT

      - name: Update README Version Hooks
        run: |
          update_gradle_dependency() {
              sed -i "s|\($1(\"$2:\)[^\"]*\(.*\)|\1$3\2|g" "$4"
          }

          update_gradle_plugin() {
              sed -i "s|\(id(\"$1\")\s*version\s*\"\)[^\"]*\(.*\)|\1$2\2|g" "$3"
          }

          update_version_by_tag() {
              local start_tag="<!-- replace $1 version -->"
              local end_tag="<!-- end replacement -->"
              local esc_start=$(echo "$start_tag" | sed 's/[*.]/\\&/g')
              local esc_end=$(echo "$end_tag" | sed 's/[*.]/\\&/g')
              sed -i "s|$esc_start.*$esc_end|$start_tag \`$2\` $end_tag|g" "$3"
          }

          VERSION="${{ steps.info.outputs.version }}"
          GRADLE_PLUGIN_ID="${{ steps.info.outputs.gradle_id }}"
          GRADLE_PLUGIN_VERSION="${{ steps.info.outputs.gradle_version }}"
          COMPILER_VERSION="${{ steps.info.outputs.compiler_version }}"
          COMPILER_COORDINATE_PREFIX="${{ steps.info.outputs.compiler_coordinate_prefix }}"
          ANNOTATION_COORDINATE_PREFIX="${{ steps.info.outputs.annotation_coordinate_prefix }}"

          find . -name "README.md" -type f | while read -r readme_file; do
            update_gradle_plugin "$GRADLE_PLUGIN_ID" "$GRADLE_PLUGIN_VERSION" "$readme_file"

            update_gradle_dependency "api" "$ANNOTATION_COORDINATE_PREFIX" "$COMPILER_VERSION" "$readme_file"
            update_gradle_dependency "compileOnly" "$ANNOTATION_COORDINATE_PREFIX" "$COMPILER_VERSION" "$readme_file"
            update_gradle_dependency "implementation" "$ANNOTATION_COORDINATE_PREFIX" "$COMPILER_VERSION" "$readme_file"

            update_gradle_dependency "api" "$COMPILER_COORDINATE_PREFIX" "$COMPILER_VERSION" "$readme_file"
            update_gradle_dependency "compileOnly" "$COMPILER_COORDINATE_PREFIX" "$COMPILER_VERSION" "$readme_file"
            update_gradle_dependency "implementation" "$COMPILER_COORDINATE_PREFIX" "$COMPILER_VERSION" "$readme_file"

            update_version_by_tag "gradle plugin" "$GRADLE_PLUGIN_VERSION" "$readme_file"
            update_version_by_tag "compiler plugin" "$COMPILER_VERSION" "$readme_file"
            update_version_by_tag "annotation library" "$COMPILER_VERSION" "$readme_file"
          done

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add "**/README.md"
          git commit -m "chore: update all READMEs to v${{ steps.info.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: Release v${{ steps.info.outputs.version }}
          body: |
            Automated release for version ${{ steps.info.outputs.version }}
            
            ### Artifacts
            - Maven Group: `ink.iowoi.kotlin`
            - Gradle Plugin: `${{ steps.info.outputs.gradle_id }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}