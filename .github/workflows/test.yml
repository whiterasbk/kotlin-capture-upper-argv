name: Run Test

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/README.md'
      - '**.md'
      - '.gitignore'
      - '.github/workflows/**'
      - '.devcontainer/devcontainer.json'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Prepare GPG Secrets
        id: prep
        run: |
          TMP_QUOTE="Good_morning_and_in_cass_I_dont_see_you_good_afternoon_good_evening_and_good_night"
          if [ -z "${{ env.GPG_PRIVATE_KEY }}" ]; then
            echo "Environment variable GPG_PRIVATE_KEY not found. Generating a temporary one..."
            export GPG_TTY=$(tty)
            gpg --batch --passphrase "$TMP_QUOTE" --pinentry-mode loopback --quick-gen-key "CI Builder <ci@example.com>" default default never
            KEY_ID=$(gpg --list-secret-keys --keyid-format SHORT | grep 'sec' | awk '{print $2}' | cut -d'/' -f2)
            echo "Generated Key ID: $KEY_ID"
            delimiter="$(openssl rand -hex 8)"
            echo "GPG_PRIVATE_KEY<<$delimiter" >> $GITHUB_ENV
            gpg --batch --armor --pinentry-mode loopback --passphrase "$TMP_QUOTE" --export-secret-keys $KEY_ID >> $GITHUB_ENV
            echo "$delimiter" >> $GITHUB_ENV
            echo "GPG_PASSWORD=$TMP_QUOTE" >> $GITHUB_ENV
          else
            echo "GPG_PRIVATE_KEY is already set. Skipping."
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ env.GPG_PRIVATE_KEY }}
          passphrase: ${{ env.GPG_PASSWORD }}
          trust_level: 5

      - name: Prepare and Run Tests
        run: |
          chmod +x ./gradlew
          if [ ! -f secret.yml ]; then
            cp secret.yml.sample secret.yml
          fi
          ./gradlew test --stacktrace