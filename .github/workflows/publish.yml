name: Strategic Publish

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/README.md'
      - '**.md'
      - '.gitignore'
      - '.github/workflows/**'
      - '.devcontainer/devcontainer.json'
  workflow_dispatch:
    inputs:
      target:
        description: 'Manual Target (all, compiler, annotations, idea, gradle)'
        default: 'all'

jobs:
  publish:
    if: |
      github.actor == 'whiterasbk' && (
        contains(github.event.head_commit.message, '[publish') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    env:
      AUTO_PUBLISH_MAVEN_REPO: true
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
      JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
      JB_CERTIFICATE_CHAIN: ${{ secrets.JB_CERTIFICATE_CHAIN }}
      JB_PRIVATE_KEY: ${{ secrets.JB_PRIVATE_KEY }}
      JB_PASSWORD: ${{ secrets.JB_PASSWORD }}
      GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
      GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Determine Publish & Test Tasks
        id: determine
        run: |
          MSG="${{ github.event.head_commit.message }}"
          MSG=$(echo "$MSG" | tr '[:upper:]' '[:lower:]')
          TARGET="${{ github.event.inputs.target }}"
          PUBLISH_TASKS=""
          TEST_TASKS=""
          
          if [[ "$MSG" == *"[publish all]"* || "$TARGET" == "all" ]]; then
            PUBLISH_TASKS="publishAllToSonatypeAndCommit"
            TEST_TASKS="test"
          else
            if [[ "$MSG" == *"[publish compiler]"* || "$TARGET" == "compiler" ]]; then
              PUBLISH_TASKS="$PUBLISH_TASKS :compiler:publishToSonatypeAndCommit"
              TEST_TASKS="$TEST_TASKS :compiler:test"
            fi
            if [[ "$MSG" == *"[publish annotations]"* || "$TARGET" == "annotations" ]]; then 
              PUBLISH_TASKS="$PUBLISH_TASKS :annotations:publishToSonatypeAndCommit" 
              TEST_TASKS="$TEST_TASKS :annotations:test"
            fi
            if [[ "$MSG" == *"[publish idea-plugin]"* || "$TARGET" == "idea-plugin" ]]; then 
              PUBLISH_TASKS="$PUBLISH_TASKS :idea-plugin:publishPlugin"
              TEST_TASKS="$TEST_TASKS :idea-plugin:test"
            fi
            if [[ "$MSG" == *"[publish gradle-plugin]"* || "$TARGET" == "gradle-plugin" ]]; then 
              PUBLISH_TASKS="$PUBLISH_TASKS :gradle-plugin:publishPlugins"
              TEST_TASKS="$TEST_TASKS :gradle-plugin:test"
            fi
          fi
          
          echo "publish_cmd=$(echo $PUBLISH_TASKS | xargs)" >> $GITHUB_OUTPUT
          echo "test_cmd=$(echo ${TEST_TASKS:-test} | xargs)" >> $GITHUB_OUTPUT

      - name: Run Tests Before Publish
        run: |
          chmod +x ./gradlew
          if [ -n "${{ steps.determine.outputs.publish_cmd }}" ]; then
            echo "Running specific tests: ${{ steps.determine.outputs.test_cmd }}"
            ./gradlew ${{ steps.determine.outputs.test_cmd }} --stacktrace
          else
            echo "No publish tasks, running default tests."
            ./gradlew test --stacktrace
          fi

      - name: Execute Publish
        run: |
          if [ -z "${{ steps.determine.outputs.publish_cmd }}" ]; then
            echo "No specific publish tasks found in message."
          else
            ./gradlew ${{ steps.determine.outputs.publish_cmd }} --no-daemon
          fi